<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback - Mereena's Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Feedback Form</h1>
  </header>

  <main>
    <form id="feedbackForm">
      <input type="text" id="visitorName" placeholder="Your Name">
      <input type="email" id="visitorEmail" placeholder="Your Email">
      <input type ="Message" id="visitorsmessage" placeholder="Your Feedback">
      <button type="submit">Submit Feedback</button>
    </form>
    <p id="feedbackMessage"></p>
  </main>

  <footer>
    <p>© Mereena's Portfolio</p>
  </footer>

  <script src="form.js"></script>
</body>
</html>
